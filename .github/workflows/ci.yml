name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enforce reviewed NEXT_PUBLIC usage
        run: node scripts/check-public-env.mjs

      - name: Secret scan (gitleaks)
        run: >
          docker run --rm
          -v "$PWD:/repo"
          -w /repo
          ghcr.io/gitleaks/gitleaks:v8.24.2
          detect --source . --config .gitleaks.toml --no-git --redact

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: guardrails
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify monorepo
        run: pnpm verify:ci

  packaging:
    name: Packaging Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate Docker Compose
        run: docker compose config > /dev/null

      - name: Build Docker image
        run: docker build -f Dockerfile .

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint charts/vibebasket

      - name: Render Helm chart
        run: >
          helm template vibebasket ./charts/vibebasket
          --set env.NEXTAUTH_URL=https://example.com
          --set secretEnv.AUTH_SECRET=dummy-secret
          > /dev/null

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Build web app
        run: pnpm build:web

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        env:
          AUTH_SECRET: vibebasket-ci-secret
          AUTH_TRUST_HOST: "true"
          PLAYWRIGHT_PREBUILT: "1"
        run: pnpm --filter web test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          retention-days: 7
