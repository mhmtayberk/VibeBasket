name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build shared packages
        run: pnpm build:packages

      - name: Typecheck web app
        run: pnpm --filter web typecheck

      - name: Build web app
        run: pnpm build:web

      - name: Run unit and integration tests
        run: pnpm test

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      - name: Build web app
        run: pnpm build:web

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        env:
          AUTH_SECRET: vibebasket-ci-secret
          AUTH_TRUST_HOST: "true"
        run: pnpm --filter web exec playwright test e2e/home.spec.ts e2e/flow.spec.ts
