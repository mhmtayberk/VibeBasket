name: Publish CLI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually publish to npm"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish vibebasket
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm CLI version
        run: |
          npm_version="$(npm --version)"
          echo "$npm_version"
          node -e 'const version = process.argv[1]; const [major, minor] = version.split(".").map(Number); if (!version || major < 11 || (major === 11 && minor < 5)) { console.error("npm " + (version || "unknown") + " is too old for trusted publishing"); process.exit(1); }' "$npm_version"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag matches CLI version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          package_version="$(node -p "require('./apps/cli/package.json').version")"
          release_tag="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$release_tag" ]; then
            echo "Tag $release_tag does not match apps/cli/package.json version $package_version"
            exit 1
          fi

      - name: Test CLI package
        run: pnpm --filter vibebasket test

      - name: Build CLI package
        run: pnpm --filter vibebasket build

      - name: Validate publish tarball
        run: pnpm --filter vibebasket pack --dry-run

      - name: Check if version already exists on npm
        id: npm-version-check
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
        working-directory: apps/cli
        run: |
          package_version="$(node -p "require('./package.json').version")"

          if npm view "vibebasket@${package_version}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "vibebasket@${package_version} is already published on npm. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "vibebasket@${package_version} is not published yet. Continuing."
          fi

      - name: Publish to npm with provenance
        if: (startsWith(github.ref, 'refs/tags/v') || inputs.publish == true) && steps.npm-version-check.outputs.already_published != 'true'
        working-directory: apps/cli
        run: npm publish --access public --provenance
