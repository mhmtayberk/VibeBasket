{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibebasket.fullname" . }}
  labels:
    {{- include "vibebasket.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ required "Set secretEnv.AUTH_SECRET or provide existingSecret before deploying VibeBasket." .Values.secretEnv.AUTH_SECRET | quote }}
  {{- range $key, $value := .Values.secretEnv }}
  {{- if ne $key "AUTH_SECRET" }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
