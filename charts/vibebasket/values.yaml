replicaCount: 1

image:
  repository: vibebasket
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: vibebasket.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

existingSecret: ""

secretEnv:
  AUTH_SECRET: ""
  AUTH_GITHUB_SECRET: ""
  AUTH_GOOGLE_SECRET: ""
  AUTH_APPLE_SECRET: ""
  AUTH_MICROSOFT_ENTRA_ID_SECRET: ""
  CATALOG_REFRESH_TOKEN: ""

podSecurityContext:
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

automountServiceAccountToken: false

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

persistence:
  enabled: true
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 5Gi

# Environment variables
env:
  NEXTAUTH_URL: "https://vibebasket.example.com"
  ADMIN_OAUTH_EMAILS: ""
  # OAuth providers (optional)
  AUTH_GITHUB_ENABLED: "false"
  AUTH_GITHUB_ID: ""
  AUTH_GOOGLE_ENABLED: "false"
  AUTH_GOOGLE_ID: ""
  AUTH_APPLE_ENABLED: "false"
  AUTH_APPLE_ID: ""
  AUTH_MICROSOFT_ENTRA_ID_ENABLED: "false"
  AUTH_MICROSOFT_ENTRA_ID_ID: ""
  # Trust proxy for reverse proxy setups
  TRUST_PROXY: "true"
  AUTH_TRUST_HOST: "true"
  # Backup storage (defaults to local)
  BACKUP_STORAGE_BACKEND: "local"
  # Registry sync tuning
  CATALOG_FETCH_RETRIES: "2"
  CATALOG_MCP_REGISTRY_TIMEOUT_MS: "60000"
  CATALOG_SKILLS_TIMEOUT_MS: "20000"

nodeSelector: {}
tolerations: []
affinity: {}
